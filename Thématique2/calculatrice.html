<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      let num1 = parseFloat(prompt("entrer votre premier nombre :"));
       let operateur = prompt("entrer un opérateur :");
       let num2 = parseFloat(prompt("entrer votre deuxieme nombre :"));
       let resultat;
       switch (operateur) {
        case '+' :
            resultat = num1 + num2;
            break;
            case '-' :
            resultat = num1 - num2;
            break;
            case '*' :
            resultat = num1 * num2;
            break;
            case '/' :
            resultat = num2 !== 0 ? num1 / num2 : 'Erreur : division par zéro';
            break;
            default: 
            resultat = 'Opérateur invalide';
       }
       alert('Résultat : ' + resultat);
       console.log('Résultat : ' + resultat);
       
        
    </script>
</body>
</html>
