<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Carnet de Contacts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📇 Carnet de Contacts</h1>
        
        <!-- Formulaire d'ajout -->
        <form id="contactForm" action="ajouter_contact.php" method="POST">
            <input type="text" name="nom" placeholder="Nom complet" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="telephone" placeholder="Téléphone" required>
            <button type="submit">Enregistrer</button>
        </form>

        <hr>

        <!-- Tableau d'affichage -->
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Email</th>
                    <th>Téléphone</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="contactTableBody">
                <!-- Les contacts s'afficheront ici via JS -->
            </tbody>
        </table>
    </div>
  
</body>
</html>
