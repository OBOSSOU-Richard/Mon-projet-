<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Carnet de Contacts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📇 Mon Carnet de Contacts</h1>
            <p>Gérez vos relations en un clic.</p>
        </header>

        <div class="toolbar">
            <a href="formulaire.html" class="btn-primary">➕ Ajouter un contact</a>
        </div>

        <section class="contacts-list">
            <table>
                <thead>
                    <tr>+30
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Téléphone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="contactTableBody">
                    <tr>
                        <td colspan="4" style="text-align:center;">Chargement des contacts...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
